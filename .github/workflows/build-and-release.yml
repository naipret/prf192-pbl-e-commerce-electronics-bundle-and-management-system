name: Build and Release

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up environment
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Build project
        shell: msys2 {0}
        run: |
          mkdir -p bin
          gcc -std=c17 -m64 -O2 -Iinclude src/*.c -o bin/prf192-pbl-e-commerce-electronics-bundle-and-management-system.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: prf192-bundle-management-windows
          path: bin/prf192-pbl-e-commerce-electronics-bundle-and-management-system.exe

  release:
    needs: build-windows
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: prf192-bundle-management-windows
          path: release-binaries

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-binaries/prf192-pbl-e-commerce-electronics-bundle-and-management-system.exe
          tag_name: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
          name: "Release ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}"
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
